<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Vario (Umik) 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2,#6dd5ed,#2193b0);
background-size:400% 400%;
animation:bg 12s ease infinite;
overflow:hidden;
height:100vh;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.screen{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
text-align:center;
transition:1s;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(.95);
}

h1{
font-size:clamp(2.5rem,8vw,5rem);
font-family:'Great Vibes',cursive;
text-shadow:0 0 20px rgba(255,255,255,.4);
margin-bottom:15px;
}

p{
font-size:1.1rem;
max-width:700px;
opacity:.95;
line-height:1.7;
}

button{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:40px;
font-size:1rem;
font-weight:700;
cursor:pointer;
background:rgba(255,255,255,.18);
backdrop-filter:blur(12px);
color:white;
box-shadow:0 10px 30px rgba(0,0,0,.18);
transition:.3s;
}

button:hover{
transform:translateY(-4px) scale(1.05);
background:rgba(255,255,255,.28);
}

.card{
width:min(90%,700px);
padding:35px;
border-radius:30px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(16px);
box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.type{
min-height:140px;
margin-top:15px;
font-size:1.05rem;
line-height:1.8;
}

.gallery{
display:flex;
gap:10px;
margin:20px 0;
justify-content:center;
flex-wrap:wrap;
}

.gallery img{
width:150px;
height:110px;
object-fit:cover;
object-position:center center;
border-radius:18px;
box-shadow:0 10px 20px rgba(0,0,0,.15);
animation:float 4s ease-in-out infinite;
}

.gallery img:nth-child(2){animation-delay:1s}
.gallery img:nth-child(3){animation-delay:2s}
.gallery img:nth-child(4){animation-delay:3s}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

#cake{
font-size:7rem;
filter:drop-shadow(0 0 20px rgba(255,255,255,.4));
margin:20px 0;
cursor:pointer;
}

.flame{
position:absolute;
font-size:2rem;
margin-top:-130px;
animation:flicker .6s infinite alternate;
}

@keyframes flicker{
from{transform:translateY(0) scale(1)}
to{transform:translateY(-3px) scale(1.05)}
}

.footer{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
font-size:.9rem;
opacity:.8;
}

.star{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.7;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;transform:scale(.7)}
to{opacity:1;transform:scale(1.5)}
}

canvas{
position:fixed;
inset:0;
pointer-events:none;
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<!-- PAGE 1 -->
<section class="screen" id="page1">
<h1>🎉 Selamat Ulang Tahun<br>VARIO ALTARO PRASETYO (Umik) 🎂</h1>
<p>Hari ini hari spesialmu umikkkk! Semoga sehat selalu, sukses, makin keren, dan semua impianmu tercapai</p>
<button onclick="nextPage()">Klik Kejutan 🎁</button>
</section>

<!-- PAGE 2 -->
<section class="screen hidden" id="page2">
<div class="card">
<h1 style="font-size:3rem;">Untuk Umik 🔥</h1>

<div class="gallery">
<img src="img/foto1.jpeg">
<img src="img/foto2.jpeg">
<img src="img/foto3.jpeg">
<img src="img/foto4.jpeg">
</div>

<div class="type" id="typing"></div>

<button onclick="showCake()">Tiup Lilin 🕯️</button>
</div>
</section>

<!-- PAGE 3 -->
<section class="screen hidden" id="page3">
<div class="card">
<h1 style="font-size:3rem;">Make A Wish 🌟</h1>

<div style="position:relative;">
<div class="flame" id="flame">🔥</div>
<div id="cake">🎂</div>
</div>

<p>Klik kuenya untuk meniup lilin</p>
</div>
</section>

<div class="footer">Made with ❤️ by Joan</div>

<script>
const p1 = document.getElementById("page1");
const p2 = document.getElementById("page2");
const p3 = document.getElementById("page3");
const typing = document.getElementById("typing");
const flame = document.getElementById("flame");

function nextPage(){
p1.classList.add("hidden");
p2.classList.remove("hidden");
typeText();
}

function showCake(){
p2.classList.add("hidden");
p3.classList.remove("hidden");
}

document.getElementById("cake").onclick = ()=>{
flame.style.opacity="0";
confetti();
setTimeout(()=>{
alert("Semoga semua harapanmu terkabul bro 🎉");
},500);
}

function typeText(){
const text = "Hai Umik xixixi, selamat ulang tahun yaaaa! Semoga di umur baru ini kamu selalu sehat, rezeki lancar, sukses dalam semua urusan, makin dewasa, dan tetap jadi pribadi keren yang selalu bikin suasana seru. Jangan pernah berhenti ngejar mimpi karena masa depan besar menunggu kamu. Happy Birthday Umikkk ";
let i=0;
const inter = setInterval(()=>{
typing.innerHTML += text.charAt(i);
i++;
if(i>=text.length) clearInterval(inter);
},28);
}

/* Stars */
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDelay=Math.random()*2+"s";
document.body.appendChild(s);
}

/* Confetti */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

function confetti(){
let pieces=[];
for(let i=0;i<180;i++){
pieces.push({
x:Math.random()*canvas.width,
y:-20,
r:Math.random()*6+3,
dx:(Math.random()-0.5)*4,
dy:Math.random()*3+2,
rot:Math.random()*360
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach((p,index)=>{
ctx.save();
ctx.translate(p.x,p.y);
ctx.rotate(p.rot);
ctx.fillStyle=`hsl(${Math.random()*360},100%,70%)`;
ctx.fillRect(-p.r,-p.r,p.r*2,p.r*2);
ctx.restore();

p.x+=p.dx;
p.y+=p.dy;
p.rot+=0.1;

if(p.y>canvas.height) pieces.splice(index,1);
});

if(pieces.length>0) requestAnimationFrame(animate);
}
animate();
}
</script>

</body>
</html>
